name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check mainframe_brain tests --config pyproject.toml
      - name: Pytest
        run: pytest tests/ -q
      - name: CLI Smoke
        run: |
          rm -f /tmp/mb.db
          python -m mainframe_brain.cli extract examples/cobol --out /tmp/mb.db
          python -m mainframe_brain.cli list-nodes --store-path /tmp/mb.db
          python -m mainframe_brain.cli query --store-path /tmp/mb.db "what touches ACCOUNTS"
          python -m mainframe_brain.cli enrich --store-path /tmp/mb.db --budget 20000 --adapter mock

  publish:
    needs: lint-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Check if version changed
        id: version-check
        run: |
          PKG_VERSION=$(python -c "import importlib.metadata; print(importlib.metadata.version('mainframe-brain')" 2>/dev/null || echo '0')
          echo "local=$PKG_VERSION" >> $GITHUB_OUTPUT
          # Compare against PyPI published version
          PYPI_VERSION=$(pip index versions mainframe-brain 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo '0')
          echo "remote=${PYPI_VERSION}" >> $GITHUB_OUTPUT
          if [ "$PKG_VERSION" != "$PYPI_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Build
        if: steps.version-check.outputs.changed == 'true'
        run: python -m build
      - name: Publish to PyPI
        if: steps.version-check.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
